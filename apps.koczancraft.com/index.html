<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Apps — Koczan Craft</title>
  <meta name="description" content="Apps built by Koczan Craft — hands-on software, made one at a time. Starting with MTG Draft Companion, with more on the way." />

  <meta property="og:type" content="website" />
  <meta property="og:title" content="Apps — Koczan Craft" />
  <meta property="og:description" content="Handcrafted software by Koczan Craft. Starting with MTG Draft Companion." />
  <meta property="og:url" content="https://apps.koczancraft.com" />

  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230a3a50'/%3E%3Ctext x='50%25' y='52%25' dominant-baseline='middle' text-anchor='middle' font-family='Georgia,serif' font-size='34' fill='%23e0bd84'%3EK%3C/text%3E%3C/svg%3E" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Hanken+Grotesk:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;600&family=Noto+Serif+JP:wght@500;600&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #0a3a50;
      --panel: rgba(255,255,255,.05);
      --panel-line: rgba(255,255,255,.1);
      --ink: #e9f2f6;
      --muted: #a9c4cf;
      --muted-2: #9fb8c2;
      --line: rgba(255,255,255,.08);
      --gold: #e0bd84;
      --gold-2: #d8b074;
      --link: #9fd4e6;
      --maxw: 1080px;
      --serif: "Cormorant Garamond", "Noto Serif JP", Georgia, "Times New Roman", serif;
      --sans: "Hanken Grotesk", "Noto Sans JP", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    :lang(ja) { --serif: "Noto Serif JP", "Cormorant Garamond", serif; }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    [hidden] { display: none !important; }
    html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
    body { background: var(--bg); color: var(--ink); font-family: var(--sans); line-height: 1.65; font-size: 17px; -webkit-font-smoothing: antialiased; overflow-x: hidden; }
    .wrap { max-width: var(--maxw); margin: 0 auto; padding: 0 28px; position: relative; z-index: 1; }
    a { color: inherit; }
    img { max-width: 100%; display: block; }

    /* Top bar */
    header { position: sticky; top: 0; z-index: 50; background: rgba(10,58,80,0.78); backdrop-filter: saturate(160%) blur(12px); border-bottom: 1px solid var(--line); }
    .bar { display: flex; align-items: center; justify-content: space-between; height: 66px; }
    .brand { display: flex; align-items: center; gap: 16px; text-decoration: none; }
    .brand .wordmark { height: 22px; width: auto; display: block; opacity: .96; }
    .brand.foot-brand .wordmark { height: 20px; opacity: .92; }
    .nav-right { display: flex; align-items: center; gap: 20px; }
    .back-home { font-size: 14px; font-weight: 500; color: var(--muted); text-decoration: none; white-space: nowrap; }
    .back-home:hover { color: var(--ink); }
    .lang-toggle { display: inline-flex; border: 1px solid rgba(255,255,255,.16); border-radius: 999px; overflow: hidden; }
    .lang-toggle button { font: inherit; font-size: 12px; font-weight: 600; padding: 7px 14px; border: 0; background: transparent; color: var(--muted-2); cursor: pointer; line-height: 1; }
    .lang-toggle button.active { background: #eaf3f7; color: #0a3a50; }

    /* Hero */
    .hero {
      position: relative; overflow: hidden; padding: 104px 0 60px;
      background:
        radial-gradient(50% 60% at 80% 0, rgba(60,168,205,.32), transparent 62%),
        radial-gradient(40% 50% at 8% 60%, rgba(18,108,150,.30), transparent 60%);
    }
    .eyebrow { font-size: 13px; font-weight: 600; letter-spacing: .2em; text-transform: uppercase; color: var(--link); margin-bottom: 22px; }
    .hero h1 { font-family: var(--serif); font-weight: 500; line-height: 1.05; font-size: clamp(36px, 6.4vw, 58px); color: #f3f9fb; max-width: 720px; margin-bottom: 24px; }
    .hero .lead { max-width: 600px; font-size: 18px; line-height: 1.7; color: var(--muted); }

    /* Category pills — filter the app grid below */
    .pills { padding-bottom: 28px; display: flex; gap: 12px; flex-wrap: wrap; }
    .pills button { font: inherit; font-size: 13px; font-weight: 600; padding: 10px 18px; border-radius: 999px; background: none; border: 1px solid rgba(255,255,255,.18); color: var(--muted); cursor: pointer; transition: background .15s ease, color .15s ease, border-color .15s ease; }
    .pills button.active { background: #eaf3f7; color: #0a3a50; border-color: transparent; }

    /* Empty state for a category with no apps yet */
    .empty-state { border: 1px dashed rgba(255,255,255,.18); border-radius: 24px; padding: 48px; text-align: center; }
    .empty-state h3 { font-family: var(--serif); font-weight: 500; font-size: 22px; color: #eaf3f7; margin-bottom: 8px; }
    .empty-state p { font-size: 14.5px; color: var(--muted-2); }

    /* Featured app card */
    .featured {
      text-decoration: none; color: inherit; display: grid; grid-template-columns: auto 1fr auto; gap: 36px; align-items: center;
      background: radial-gradient(120% 150% at 88% 0, rgba(216,176,116,.14), transparent 55%), var(--panel);
      border: 1px solid var(--panel-line); border-radius: 24px; padding: 40px;
      transition: transform .22s ease, border-color .22s ease;
    }
    .featured:hover { transform: translateY(-4px); border-color: rgba(255,255,255,.22); }
    .featured .app-icon { width: 118px; height: 118px; border-radius: 26px; border: 1px solid rgba(255,255,255,.14); box-shadow: 0 16px 40px -18px rgba(0,0,0,.7); }
    .featured .badge { font-size: 11px; font-weight: 600; letter-spacing: .18em; text-transform: uppercase; color: var(--gold-2); margin-bottom: 10px; }
    .featured h2 { font-family: var(--serif); font-weight: 600; font-size: 34px; margin-bottom: 12px; color: #f3f9fb; }
    .featured p.desc { font-size: 15.5px; line-height: 1.6; color: var(--muted); max-width: 540px; }
    .featured .go { justify-self: start; width: fit-content; display: inline-flex; align-items: center; gap: 10px; font-weight: 600; font-size: 14px; color: #0a3a50; background: #eaf3f7; padding: 14px 22px; border-radius: 999px; white-space: nowrap; }

    /* Coming soon */
    .soon-section { padding: 64px 0 100px; }
    .soon-head { display: flex; align-items: baseline; justify-content: space-between; gap: 20px; margin-bottom: 26px; flex-wrap: wrap; }
    .soon-head h3 { font-family: var(--serif); font-weight: 500; font-size: 26px; color: #eaf3f7; }
    .soon-head p { font-size: 14.5px; color: var(--muted-2); max-width: 420px; }
    .soon-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; }
    .soon-card {
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 13px;
      border: 1px dashed rgba(255,255,255,.18); border-radius: 20px; padding: 24px; min-height: 200px;
      background: rgba(255,255,255,.012);
    }
    .soon-card .plus { width: 46px; height: 46px; border-radius: 13px; border: 1px solid rgba(255,255,255,.18); display: grid; place-items: center; color: var(--muted-2); font-size: 26px; font-weight: 300; }
    .soon-card span.label { font-size: 12px; font-weight: 600; letter-spacing: .14em; text-transform: uppercase; color: var(--muted-2); }

    /* Footer */
    footer { border-top: 1px solid var(--line); padding: 52px 0; }
    .foot-grid { display: flex; align-items: center; justify-content: space-between; gap: 24px; flex-wrap: wrap; }
    .foot-links { display: flex; gap: 22px; font-size: 14px; font-weight: 500; }
    .foot-links a { color: var(--muted-2); text-decoration: none; }
    .foot-links a:hover { color: var(--ink); }

    @media (max-width: 760px) {
      .featured { grid-template-columns: 1fr; gap: 24px; text-align: left; }
      .soon-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 480px) {
      .pills { gap: 8px; }
      .pills span { padding: 8px 14px; font-size: 12.5px; }
      /* Not enough width for wordmark + back-link + lang toggle — the wordmark already links home. */
      .back-home { display: none; }
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap bar">
      <a class="brand" href="https://koczancraft.com" aria-label="Koczan Craft">
        <img class="wordmark" src="assets/wordmark-white.png" alt="Koczan Craft" />
      </a>
      <div class="nav-right">
        <a class="back-home" href="https://koczancraft.com">koczancraft.com ↗</a>
        <div class="lang-toggle" role="group" aria-label="Language">
          <button data-setlang="en" class="active">EN</button>
          <button data-setlang="ja">日本語</button>
        </div>
      </div>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="wrap">
        <p class="eyebrow" data-i18n="hub.kicker"></p>
        <h1 data-i18n="hub.title"></h1>
        <p class="lead" data-i18n="hub.sub"></p>
      </div>
    </section>

    <div class="wrap pills">
      <button type="button" class="active" data-filter="all" data-i18n="hub.fAll"></button>
      <button type="button" data-filter="games" data-i18n="hub.fGames"></button>
      <button type="button" data-filter="tools" data-i18n="hub.fTools"></button>
    </div>

    <div class="wrap">
      <a class="featured" data-category="games" href="https://mtgdraftcompanion.koczancraft.com">
        <img class="app-icon" src="assets/mtg-icon.png" alt="MTG Draft Companion app icon" />
        <div>
          <p class="badge"><span data-i18n="hub.featured"></span> · <span data-i18n="apps.soon"></span></p>
          <h2>MTG Draft Companion</h2>
          <p class="desc" data-i18n="hub.desc"></p>
        </div>
        <span class="go" data-i18n="hub.learn"></span>
      </a>
      <div class="empty-state" id="emptyState" hidden>
        <h3 data-i18n="hub.emptyTitle"></h3>
        <p data-i18n="hub.emptyBody"></p>
      </div>
    </div>

    <section class="soon-section" id="soonSection">
      <div class="wrap">
        <div class="soon-head">
          <h3 data-i18n="hub.soonTitle"></h3>
          <p data-i18n="hub.soonBody"></p>
        </div>
        <div class="soon-grid">
          <div class="soon-card"><span class="plus" aria-hidden="true">+</span><span class="label" data-i18n="apps.soon"></span></div>
          <div class="soon-card"><span class="plus" aria-hidden="true">+</span><span class="label" data-i18n="apps.soon"></span></div>
          <div class="soon-card"><span class="plus" aria-hidden="true">+</span><span class="label" data-i18n="apps.soon"></span></div>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <div class="wrap">
      <div class="foot-grid">
        <a class="brand foot-brand" href="https://koczancraft.com" aria-label="Koczan Craft">
          <img class="wordmark" src="assets/wordmark-white.png" alt="Koczan Craft" />
        </a>
        <div class="foot-links">
          <a href="https://koczancraft.com">koczancraft.com</a>
          <a href="https://www.instagram.com/koczancraft/" target="_blank" rel="noopener">Instagram</a>
          <!-- Privacy → the MTG app's policy; href is set per-language in applyLang() so EN→EN, JA→JA. -->
          <a id="privacyLink" href="https://mtgdraftcompanion.koczancraft.com/privacy.html" data-i18n="footer.privacy"></a>
          <a href="mailto:contact@koczancraft.com" data-i18n="footer.contact"></a>
        </div>
      </div>
    </div>
  </footer>

  <script>
    var I18N = {
      en: {
        "hub.kicker": "Koczan Craft · Apps",
        "hub.title": "Handcrafted software.",
        "hub.sub": "Apps made with the same care as everything else on the bench — useful, quiet, and built to last. The collection grows as new ones are ready.",
        "hub.fAll": "All",
        "hub.fGames": "Games & tabletop",
        "hub.fTools": "Tools",
        "hub.featured": "Featured",
        "hub.desc": "Run smoother draft nights. Track every pick, keep the pack-and-pass moving, and share the draft with your whole table — a calm companion for Magic: The Gathering drafts.",
        "hub.learn": "Learn more",
        "hub.soonTitle": "Something new is on the bench.",
        "hub.soonBody": "New apps are added here as they're ready. Check back soon.",
        "hub.emptyTitle": "Nothing here yet.",
        "hub.emptyBody": "This category is still empty — check back as the collection grows.",
        "apps.soon": "Coming soon",
        "footer.privacy": "Privacy Policy",
        "footer.contact": "Contact"
      },
      ja: {
        "hub.kicker": "Koczan Craft · アプリ",
        "hub.title": "手づくりのソフトウェア。",
        "hub.sub": "作業台の上のものと同じ心づかいでつくるアプリ。役に立って、静かで、長く使えるもの。準備ができ次第、ここに増えていきます。",
        "hub.fAll": "すべて",
        "hub.fGames": "ゲーム・卓上",
        "hub.fTools": "ツール",
        "hub.featured": "注目",
        "hub.desc": "ドラフトの夜を、もっと心地よく。すべてのピックを記録し、パックの受け渡しをスムーズに保ち、テーブル全員でドラフトを共有。マジックのドラフトに寄り添うコンパニオンです。",
        "hub.learn": "詳しく見る",
        "hub.soonTitle": "新しいものを、作業台の上で。",
        "hub.soonBody": "新しいアプリは準備ができ次第ここに追加されます。お楽しみに。",
        "hub.emptyTitle": "まだここには何もありません。",
        "hub.emptyBody": "このカテゴリーはまだ空です。コレクションが増えるとここに追加されます。",
        "apps.soon": "近日公開",
        "footer.privacy": "プライバシーポリシー",
        "footer.contact": "お問い合わせ"
      }
    };

    function applyLang(lang) {
      var dict = I18N[lang] || I18N.en;
      document.documentElement.lang = lang;
      document.querySelectorAll("[data-i18n]").forEach(function (el) {
        var key = el.getAttribute("data-i18n");
        if (dict[key] != null) el.innerHTML = dict[key];
      });
      document.querySelectorAll("[data-setlang]").forEach(function (b) {
        b.classList.toggle("active", b.getAttribute("data-setlang") === lang);
      });
      // Carry the language across to the MTG privacy page (different origin → no shared storage).
      var pl = document.getElementById("privacyLink");
      if (pl) pl.href = "https://mtgdraftcompanion.koczancraft.com/privacy.html?lang=" + lang;
      try { localStorage.setItem("lang", lang); } catch (e) {}
    }
    document.querySelectorAll("[data-setlang]").forEach(function (b) {
      b.addEventListener("click", function () { applyLang(b.getAttribute("data-setlang")); });
    });

    // Category filter — shows/hides app cards by data-category; "all" always shows everything.
    var apps = document.querySelectorAll("[data-category]");
    var emptyState = document.getElementById("emptyState");
    var soonSection = document.getElementById("soonSection");
    function applyFilter(filter) {
      var visible = 0;
      apps.forEach(function (card) {
        var match = filter === "all" || card.getAttribute("data-category") === filter;
        card.hidden = !match;
        if (match) visible++;
      });
      if (emptyState) emptyState.hidden = visible > 0;
      if (soonSection) soonSection.hidden = filter !== "all";
    }
    document.querySelectorAll("[data-filter]").forEach(function (b) {
      b.addEventListener("click", function () {
        document.querySelectorAll("[data-filter]").forEach(function (x) { x.classList.toggle("active", x === b); });
        applyFilter(b.getAttribute("data-filter"));
      });
    });

    var saved;
    try { saved = localStorage.getItem("lang"); } catch (e) {}
    var initial = saved || ((navigator.language || "en").toLowerCase().indexOf("ja") === 0 ? "ja" : "en");
    applyLang(initial);
  </script>
</body>
</html>
