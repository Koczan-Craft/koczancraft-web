<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MTG Draft Companion</title>
  <meta name="description" content="MTG Draft Companion — run better Magic: The Gathering draft nights. Live standings, a built-in life counter, deck building, and full Japanese card support. iOS, iPad & Android." />
  <link rel="icon" href="icon.png" />
  <meta property="og:title" content="MTG Draft Companion" />
  <meta property="og:description" content="Run better Magic draft nights — standings, life counter, deck building, and Japanese card support." />
  <meta property="og:image" content="icon.png" />
  <style>
    :root {
      --gold: #C4A44A;
      --gold-bright: #DcC079;
      --gold-deep: #8f7530;
      --ink: #0b0a08;
      --bg: #0c0b09;
      --panel: #15130f;
      --panel-2: #1b1813;
      --text: #ece8df;
      --muted: #9b9488;
      --border: #2a2620;
      --border-gold: rgba(196,164,74,0.32);
      --serif: "Iowan Old Style", "Palatino Linotype", Palatino, "Book Antiqua", Georgia, serif;
      --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    * { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      line-height: 1.65;
      overflow-x: hidden;
    }
    a { color: var(--gold-bright); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .wrap { max-width: 1040px; margin: 0 auto; padding: 0 24px; }

    /* Top gold hairline + lang toggle */
    .topbar {
      position: sticky; top: 0; z-index: 50;
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 24px;
      background: rgba(12,11,9,0.72);
      backdrop-filter: saturate(140%) blur(10px);
      -webkit-backdrop-filter: saturate(140%) blur(10px);
      border-bottom: 1px solid var(--border);
    }
    .brand { display: inline-flex; align-items: center; gap: 9px; color: var(--text); text-decoration: none; font-weight: 700; letter-spacing: -0.01em; }
    .brand:hover { text-decoration: none; }
    .brand img { width: 28px; height: 28px; border-radius: 7px; box-shadow: 0 0 0 1px var(--border-gold); }
    .brand span { font-size: 0.96rem; }
    .brand .accent { color: var(--gold); }
    @media (max-width: 420px) { .brand span { display: none; } }
    .lang-toggle {
      display: inline-flex; align-items: center;
      border: 1px solid var(--border-gold); border-radius: 999px;
      overflow: hidden; font-size: 0.82rem; font-weight: 600;
    }
    .lang-toggle button {
      background: transparent; border: 0; color: var(--muted);
      padding: 6px 14px; cursor: pointer; font: inherit; letter-spacing: .02em;
      transition: color .15s, background .15s;
    }
    .lang-toggle button.active { background: var(--gold); color: var(--ink); }

    /* Hero */
    header.hero {
      position: relative;
      text-align: center;
      padding: 64px 24px 60px;
      background:
        radial-gradient(900px 360px at 50% -8%, rgba(196,164,74,0.16), transparent 62%),
        radial-gradient(600px 300px at 50% 0%, rgba(196,164,74,0.07), transparent 70%);
    }
    .crest {
      position: relative;
      width: 104px; height: 104px;
      margin: 0 auto 26px;
    }
    .crest img {
      width: 100%; height: 100%;
      border-radius: 24px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.6), 0 0 0 1px var(--border-gold);
      display: block;
    }
    .crest::after {
      content: ""; position: absolute; inset: -10px;
      border-radius: 30px;
      box-shadow: 0 0 50px 6px rgba(196,164,74,0.22);
      pointer-events: none;
    }
    .hero h1 {
      font-family: var(--sans);
      font-size: clamp(2.2rem, 6.5vw, 3.4rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      margin: 0 0 16px;
      line-height: 1.05;
    }
    .hero h1 .accent {
      background: linear-gradient(180deg, var(--gold-bright), var(--gold-deep));
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent; color: var(--gold);
    }
    .hero .tagline {
      font-family: var(--serif);
      font-size: clamp(1.1rem, 2.4vw, 1.4rem);
      font-style: italic;
      color: #cfc8ba;
      max-width: 640px;
      margin: 0 auto 36px;
      line-height: 1.5;
    }

    /* Store buttons */
    .stores { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
    .store-btn {
      display: inline-flex; align-items: center; gap: 12px;
      padding: 12px 22px; border-radius: 13px;
      border: 1px solid var(--border-gold);
      background: linear-gradient(180deg, var(--panel-2), var(--panel));
      color: var(--text); font-weight: 600;
      transition: border-color .15s, transform .06s, box-shadow .15s;
    }
    .store-btn:hover {
      border-color: var(--gold); text-decoration: none;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
    .store-btn svg { width: 26px; height: 26px; color: var(--text); }
    .store-btn .sub { display: block; font-size: 0.7rem; color: var(--muted); font-weight: 500; letter-spacing: .03em; text-transform: uppercase; }
    .store-btn .main { display: block; font-size: 1.02rem; }
    .store-note { margin-top: 16px; font-size: 0.82rem; color: var(--muted); letter-spacing: .02em; }

    /* Section scaffolding */
    section { padding: 64px 0; position: relative; }
    .divider { text-align: center; color: var(--gold-deep); font-size: 0.9rem; letter-spacing: .5em; }
    .eyebrow {
      text-align: center; text-transform: uppercase; letter-spacing: .28em;
      font-size: 0.72rem; font-weight: 700; color: var(--gold);
      margin: 0 0 10px;
    }
    section h2 {
      font-family: var(--serif);
      font-size: clamp(1.6rem, 3.6vw, 2.1rem);
      font-weight: 600; text-align: center; margin: 0 0 12px;
      letter-spacing: -0.01em;
    }
    section .lead { text-align: center; color: var(--muted); max-width: 620px; margin: 0 auto 44px; font-size: 1.02rem; }

    /* Features */
    .features { display: grid; grid-template-columns: repeat(auto-fit, minmax(258px, 1fr)); gap: 18px; }
    .feature {
      background: linear-gradient(180deg, var(--panel-2), var(--panel));
      border: 1px solid var(--border);
      border-radius: 16px; padding: 26px 24px;
      transition: border-color .18s, transform .18s;
    }
    .feature:hover { border-color: var(--border-gold); transform: translateY(-3px); }
    .feature .ic-wrap {
      width: 52px; height: 52px; border-radius: 13px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 16px;
      background: radial-gradient(circle at 30% 25%, rgba(196,164,74,0.16), rgba(196,164,74,0.04));
      border: 1px solid var(--border-gold);
    }
    .feature .ic { width: 28px; height: 28px; color: var(--gold-bright); }
    .feature h3 { font-family: var(--serif); margin: 0 0 7px; font-size: 1.16rem; color: var(--text); font-weight: 600; }
    .feature p { margin: 0; color: var(--muted); font-size: 0.95rem; }

    /* Steps */
    .steps { display: grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); gap: 18px; counter-reset: step; }
    .step {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 16px; padding: 26px 24px; position: relative;
    }
    .step::before {
      counter-increment: step; content: counter(step);
      display: inline-flex; align-items: center; justify-content: center;
      width: 38px; height: 38px; border-radius: 50%;
      background: linear-gradient(180deg, var(--gold-bright), var(--gold-deep));
      color: var(--ink); font-weight: 800; font-size: 1.05rem;
      margin-bottom: 14px; box-shadow: 0 4px 14px rgba(196,164,74,0.25);
    }
    .step h3 { font-family: var(--serif); margin: 0 0 7px; font-size: 1.12rem; font-weight: 600; }
    .step p { margin: 0; color: var(--muted); font-size: 0.94rem; }
    .browse-note { text-align: center; color: #cfc8ba; max-width: 560px; margin: 34px auto 0; font-style: italic; font-family: var(--serif); }

    /* Contact */
    #contact { border-top: 1px solid var(--border); }
    .contact-card {
      max-width: 620px; margin: 0 auto;
      background: linear-gradient(180deg, var(--panel-2), var(--panel));
      border: 1px solid var(--border-gold);
      border-radius: 18px; padding: 32px;
    }
    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--gold); margin-bottom: 6px; letter-spacing: .02em; }
    .field input, .field select, .field textarea {
      width: 100%; padding: 11px 13px; font: inherit; color: var(--text);
      background: var(--ink); border: 1px solid var(--border); border-radius: 10px;
      transition: border-color .15s;
    }
    .field input:focus, .field select:focus, .field textarea:focus { outline: none; border-color: var(--gold); }
    .field textarea { resize: vertical; min-height: 110px; }
    .send-btn {
      width: 100%; padding: 13px; border: 0; border-radius: 11px; cursor: pointer;
      font: inherit; font-weight: 700; letter-spacing: .03em; color: var(--ink);
      background: linear-gradient(180deg, var(--gold-bright), var(--gold-deep));
      transition: filter .15s, transform .06s;
    }
    .send-btn:hover { filter: brightness(1.06); }
    .send-btn:active { transform: translateY(1px); }
    .form-hint { font-size: 0.78rem; color: var(--muted); text-align: center; margin: 14px 0 0; }
    .form-status { font-size: 0.92rem; text-align: center; margin: 14px 0 0; font-weight: 600; }
    .form-status.ok { color: #7BD389; }
    .form-status.err { color: #E08A8A; }
    .send-btn[disabled] { opacity: .6; cursor: default; }

    /* Footer */
    footer { padding: 52px 0 64px; border-top: 1px solid var(--border); }
    .disclaimer {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 14px; padding: 22px 24px;
      font-size: 0.85rem; color: var(--muted); max-width: 780px; margin: 0 auto 26px;
    }
    .disclaimer strong { color: var(--text); }
    .disclaimer p { margin: 0 0 10px; }
    .disclaimer p:last-child { margin: 0; }
    .foot-links { text-align: center; font-size: 0.92rem; }
    .foot-links a { margin: 0 12px; color: var(--gold-bright); }
    .copyright { text-align: center; margin-top: 22px; font-size: 0.78rem; color: #6c665b; }

    [hidden] { display: none !important; }
  </style>
</head>

    function applyLang(lang) {
      var dict = I18N[lang] || I18N.en;
      document.documentElement.lang = lang;
      document.querySelectorAll("[data-i18n]").forEach(function (el) {
        var key = el.getAttribute("data-i18n");
        if (dict[key] != null) el.innerHTML = dict[key];
      });
      document.querySelectorAll("[data-setlang]").forEach(function (b) {
        b.classList.toggle("active", b.getAttribute("data-setlang") === lang);
      });
      try { localStorage.setItem("lang", lang); } catch (e) {}
    }

    document.querySelectorAll("[data-setlang]").forEach(function (b) {
      b.addEventListener("click", function () { applyLang(b.getAttribute("data-setlang")); });
    });

    // Contact form → Web3Forms (emails you directly; inline success, no page reload, no draft).
    document.getElementById("contactForm").addEventListener("submit", function (e) {
      e.preventDefault();
      var lang = document.documentElement.lang === "ja" ? "ja" : "en";
      var dict = I18N[lang] || I18N.en;
      var f = e.target;
      var btn = f.querySelector(".send-btn");
      var status = document.getElementById("formStatus");
      var reasonText = f.reason.options[f.reason.selectedIndex].text;

      function setStatus(msg, cls) { status.hidden = false; status.textContent = msg; status.className = "form-status " + cls; }

      if (WEB3FORMS_KEY === "REPLACE_WITH_WEB3FORMS_ACCESS_KEY") {
        setStatus(dict["contact.error"], "err");
        console.warn("Contact form: set WEB3FORMS_KEY (see https://web3forms.com).");
        return;
      }

      btn.disabled = true;
      setStatus(dict["contact.sending"], "");
      fetch("https://api.web3forms.com/submit", {
        method: "POST",
        headers: { "Content-Type": "application/json", Accept: "application/json" },
        body: JSON.stringify({
          access_key: WEB3FORMS_KEY,
          subject: "[MTG Draft Companion] " + reasonText,
          from_name: f.name.value || "MTG Draft Companion site",
          name: f.name.value,
          email: f.email.value,
          reason: reasonText,
          message: f.message.value,
        }),
      })
        .then(function (r) { return r.json(); })
        .then(function (data) {
          if (data && data.success) { setStatus(dict["contact.success"], "ok"); f.reset(); }
          else { setStatus(dict["contact.error"], "err"); }
        })
        .catch(function () { setStatus(dict["contact.error"], "err"); })
        .finally(function () { btn.disabled = false; });
    });

    // initial language: saved → browser → en
    var saved;
    try { saved = localStorage.getItem("lang"); } catch (e) {}
    var initial = saved || ((navigator.language || "en").toLowerCase().indexOf("ja") === 0 ? "ja" : "en");
    applyLang(initial);
  </script>
