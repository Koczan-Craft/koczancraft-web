<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Koczan Craft — handmade things, by one person</title>
  <meta name="description" content="Koczan Craft is the home for everything I make — from hand-cut leather goods to handcrafted apps. One person, many crafts, made slowly and by hand." />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Koczan Craft" />
  <meta property="og:description" content="One maker, many crafts. From hand-stitched leather to handcrafted apps." />
  <meta property="og:url" content="https://koczancraft.com" />

  <!-- Inline monogram favicon (no asset dependency) -->
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230a3a50'/%3E%3Ctext x='50%25' y='52%25' dominant-baseline='middle' text-anchor='middle' font-family='Georgia,serif' font-size='34' fill='%23e0bd84'%3EK%3C/text%3E%3C/svg%3E" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Hanken+Grotesk:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;600&family=Noto+Serif+JP:wght@500;600&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #0a3a50;
      --panel: rgba(255,255,255,.05);
      --panel-line: rgba(255,255,255,.1);
      --ink: #e9f2f6;
      --muted: #a9c4cf;
      --muted-2: #9fb8c2;
      --line: rgba(255,255,255,.08);
      --gold: #e0bd84;
      --gold-2: #d8b074;
      --link: #9fd4e6;
      --maxw: 1080px;
      --serif: "Cormorant Garamond", "Noto Serif JP", Georgia, "Times New Roman", serif;
      --sans: "Hanken Grotesk", "Noto Sans JP", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    :lang(ja) { --serif: "Noto Serif JP", "Cormorant Garamond", serif; }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
    body {
      background: var(--bg); color: var(--ink); font-family: var(--sans);
      line-height: 1.65; font-size: 17px; -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }
    .wrap { max-width: var(--maxw); margin: 0 auto; padding: 0 28px; position: relative; z-index: 1; }
    a { color: inherit; }
    img { max-width: 100%; display: block; }
    ::selection { background: #0e5676; color: #fff; }

    /* ── Top bar ─────────────────────────────────────────── */
    header {
      position: sticky; top: 0; z-index: 50;
      background: rgba(10,58,80,0.78); backdrop-filter: saturate(160%) blur(12px);
      border-bottom: 1px solid var(--line);
    }
    .bar { display: flex; align-items: center; justify-content: space-between; height: 66px; }
    .brand { display: flex; align-items: center; text-decoration: none; }
    .brand .wordmark { height: 24px; width: auto; display: block; opacity: .96; }
    .nav-links { display: flex; align-items: center; gap: 32px; }
    nav.section-nav { display: flex; gap: 26px; font-size: 14px; font-weight: 500; color: var(--muted); }
    nav.section-nav a { text-decoration: none; color: var(--muted); transition: color .15s ease; }
    nav.section-nav a:hover { color: var(--ink); }
    .lang-toggle { display: inline-flex; border: 1px solid rgba(255,255,255,.16); border-radius: 999px; overflow: hidden; }
    .lang-toggle button {
      font: inherit; font-size: 12px; font-weight: 600; padding: 7px 14px; border: 0;
      background: transparent; color: var(--muted-2); cursor: pointer; line-height: 1;
    }
    .lang-toggle button.active { background: #eaf3f7; color: #0a3a50; }

    /* ── Hero ────────────────────────────────────────────── */
    .hero {
      position: relative; overflow: hidden; text-align: center;
      padding: 128px 0 116px;
      background:
        radial-gradient(55% 45% at 72% 12%, rgba(60,168,205,.40), transparent 62%),
        radial-gradient(52% 46% at 16% 84%, rgba(18,108,150,.42), transparent 60%),
        radial-gradient(46% 46% at 90% 94%, rgba(216,176,116,.14), transparent 60%);
    }
    .hero-glow {
      position: absolute; top: -40px; left: 50%; width: 540px; height: 540px; border-radius: 50%;
      background: radial-gradient(circle, rgba(120,205,235,.20), transparent 70%);
      filter: blur(14px); animation: kc-drift 9s ease-in-out infinite; pointer-events: none;
      transform: translateX(-50%);
    }
    @keyframes kc-drift { 0%,100% { transform: translate(-50%, 0); } 50% { transform: translate(-50%, -22px); } }
    .hero .inner { max-width: 820px; margin: 0 auto; }
    .eyebrow {
      font-size: 13px; font-weight: 600; letter-spacing: .2em; text-transform: uppercase;
      color: var(--gold); margin-bottom: 42px;
    }
    .hero-logo { width: min(540px, 82%); height: auto; margin: 0 auto 46px; display: block; }
    .hero h1 {
      font-family: var(--serif); font-weight: 500; line-height: 1.07;
      font-size: clamp(40px, 7vw, 58px); letter-spacing: .2px; margin-bottom: 24px; color: #f3f9fb;
    }
    .hero .tagline {
      font-size: clamp(16px, 2vw, 18px); color: var(--muted); max-width: 600px; margin: 0 auto; line-height: 1.65;
    }
    .hero .scroll-cue {
      margin-top: 52px; font-size: 12px; font-weight: 600; letter-spacing: .16em; text-transform: uppercase;
      color: var(--gold); display: inline-flex; align-items: center; gap: 12px; text-decoration: none;
    }
    .hero .scroll-cue::after { content: ""; width: 46px; height: 1px; background: rgba(216,176,116,.7); }

    /* ── Section scaffolding ─────────────────────────────── */
    section { scroll-margin-top: 80px; }
    .band { padding: 92px 0; border-top: 1px solid var(--line); }
    .sec-head { max-width: 640px; margin-bottom: 46px; }
    .sec-head .kicker { font-size: 12px; font-weight: 600; letter-spacing: .2em; text-transform: uppercase; color: var(--gold); margin-bottom: 14px; }
    .sec-head h2 { font-family: var(--serif); font-weight: 500; font-size: clamp(30px, 4.2vw, 42px); line-height: 1.1; margin-bottom: 14px; color: #f3f9fb; }
    .sec-head p { color: var(--muted); font-size: 17px; line-height: 1.6; }

    /* About row */
    .about-grid { display: grid; grid-template-columns: 1.1fr 1fr; gap: 60px; align-items: center; }
    .about-grid .kicker { font-size: 12px; font-weight: 600; letter-spacing: .2em; text-transform: uppercase; color: var(--gold); margin-bottom: 16px; }
    .about-grid .lede { font-family: var(--serif); font-size: clamp(22px, 2.6vw, 29px); line-height: 1.34; font-weight: 500; color: #eaf3f7; }
    .about-grid .body { color: var(--muted); font-size: 16.5px; line-height: 1.75; }

    /* ── Leather section ─────────────────────────────────── */
    .leather-wrap { display: grid; grid-template-columns: 330px 1fr; gap: 38px; align-items: start; }
    .ig-card {
      background: var(--panel); border: 1px solid var(--panel-line); border-radius: 18px; padding: 26px;
      position: sticky; top: 90px;
    }
    .ig-card .ig-handle { display: flex; align-items: center; gap: 13px; margin-bottom: 18px; }
    .ig-badge {
      width: 46px; height: 46px; border-radius: 13px; flex: none;
      background: linear-gradient(45deg, #f09433, #e6683c 30%, #dc2743 55%, #bc1888 90%);
      display: grid; place-items: center;
    }
    .ig-badge svg { width: 23px; height: 23px; }
    .ig-card .ig-handle b { font-size: 16px; color: #fff; }
    .ig-card .ig-handle span { display: block; font-size: 13px; color: var(--muted-2); }
    .ig-card p { font-size: 14.5px; color: var(--muted); margin-bottom: 20px; line-height: 1.6; }
    .ig-follow {
      display: inline-flex; align-items: center; gap: 9px; width: 100%; justify-content: center;
      background: #eaf3f7; color: #0a3a50; text-decoration: none; font-weight: 600; font-size: 15px;
      padding: 14px; border-radius: 12px; transition: transform .15s ease, opacity .15s ease;
    }
    .ig-follow:hover { transform: translateY(-1px); opacity: .92; }

    .ig-posts { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; align-content: start; min-width: 0; }
    .ig-thumb {
      position: relative; display: block; aspect-ratio: 1 / 1; border-radius: 14px; overflow: hidden;
      border: 1px solid var(--panel-line); background: var(--panel);
    }
    .ig-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform .5s ease; }
    .ig-thumb::after { content: ""; position: absolute; inset: 0; background: rgba(0,0,0,0); transition: background .25s ease; }
    .ig-thumb:hover img { transform: scale(1.05); }
    .ig-thumb:hover::after { background: rgba(0,0,0,.12); }

    /* ── Apps grid ───────────────────────────────────────── */
    .app-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; margin-top: 4px; }
    .app-card {
      text-decoration: none; color: inherit; display: flex; flex-direction: column; gap: 16px;
      background: radial-gradient(120% 130% at 85% 0, rgba(216,176,116,.13), transparent 55%), var(--panel);
      border: 1px solid var(--panel-line); border-radius: 20px; padding: 24px;
      transition: transform .22s ease, border-color .22s ease;
    }
    .app-card:hover { transform: translateY(-4px); border-color: rgba(255,255,255,.22); }
    .app-icon { width: 62px; height: 62px; border-radius: 15px; border: 1px solid var(--panel-line); box-shadow: 0 10px 24px -12px rgba(0,0,0,.6); }
    .soon-badge { font-size: 11px; font-weight: 600; letter-spacing: .16em; text-transform: uppercase; color: var(--gold-2); margin-bottom: 9px; }
    .app-card h3 { font-family: var(--serif); font-weight: 600; font-size: 23px; margin-bottom: 8px; color: #f3f9fb; }
    .app-card p { font-size: 14px; line-height: 1.55; color: var(--muted); }
    .app-go { margin-top: auto; display: inline-flex; align-items: center; gap: 8px; font-weight: 600; font-size: 13px; color: var(--link); }

    .app-placeholder {
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 13px;
      border: 1px dashed rgba(255,255,255,.18); border-radius: 20px; padding: 24px; min-height: 248px;
      background: rgba(255,255,255,.012);
    }
    .app-placeholder .plus {
      width: 46px; height: 46px; border-radius: 13px; border: 1px solid rgba(255,255,255,.18);
      display: grid; place-items: center; color: var(--muted-2); font-size: 26px; font-weight: 300;
    }
    .app-placeholder span.label { font-size: 12px; font-weight: 600; letter-spacing: .14em; text-transform: uppercase; color: var(--muted-2); }

    .apps-more {
      margin-top: 34px; display: inline-flex; align-items: center; gap: 11px;
      font-size: 14px; font-weight: 600; color: #eaf3f7; text-decoration: none;
    }
    .apps-more .arrow {
      width: 34px; height: 34px; border-radius: 999px; border: 1px solid rgba(255,255,255,.3);
      display: grid; place-items: center; transition: transform .22s ease, background .22s ease;
    }
    .apps-more:hover .arrow { transform: translateX(4px); background: rgba(255,255,255,.08); }

    /* ── Footer ──────────────────────────────────────────── */
    footer { border-top: 1px solid var(--line); padding: 52px 0; }
    .foot-grid { display: flex; align-items: flex-end; justify-content: space-between; gap: 30px; flex-wrap: wrap; }
    .foot-grid .wordmark { height: 20px; width: auto; display: block; opacity: .92; }
    .foot-grid .more { font-family: var(--serif); font-size: 18px; max-width: 320px; line-height: 1.4; color: var(--muted-2); margin-top: 16px; }
    .foot-links { display: flex; gap: 22px; font-size: 14px; font-weight: 500; justify-content: flex-end; }
    .foot-links a { color: var(--muted-2); text-decoration: none; transition: color .15s ease; }
    .foot-links a:hover { color: var(--ink); }
    .copyright { margin-top: 18px; font-size: 12.5px; color: #7f9aa6; text-align: right; }
    .foot-right { text-align: right; }

    @media (max-width: 860px) {
      nav.section-nav { display: none; }
      .about-grid { grid-template-columns: 1fr; gap: 28px; }
      .leather-wrap { grid-template-columns: 1fr; }
      .ig-card { position: static; }
      .ig-posts { gap: 10px; }
      .app-grid { grid-template-columns: 1fr; }
      .foot-grid { align-items: flex-start; }
      .foot-links { justify-content: flex-start; }
      .foot-right, .copyright { text-align: left; }
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap bar">
      <a class="brand" href="#top" aria-label="Koczan Craft">
        <img class="wordmark" src="assets/wordmark-white.png" alt="Koczan Craft" />
      </a>
      <div class="nav-links">
        <nav class="section-nav">
          <a href="#leather" data-i18n="nav.leather"></a>
          <a href="#apps" data-i18n="nav.apps"></a>
        </nav>
        <div class="lang-toggle" role="group" aria-label="Language">
          <button data-setlang="en" class="active">EN</button>
          <button data-setlang="ja">日本語</button>
        </div>
      </div>
    </div>
  </header>

  <main id="top">
    <!-- ── Hero ─────────────────────────────────────────── -->
    <section class="hero">
      <div class="hero-glow" aria-hidden="true"></div>
      <div class="wrap inner">
        <p class="eyebrow" data-i18n="hero.eyebrow"></p>
        <img class="hero-logo" src="assets/wordmark-white.png" alt="Koczan Craft" />
        <h1 data-i18n="hero.title"></h1>
        <p class="tagline" data-i18n="hero.sub"></p>
        <a class="scroll-cue" href="#about" data-i18n="hero.cue"></a>
      </div>
    </section>

    <!-- ── About ────────────────────────────────────────── -->
    <section id="about" class="band">
      <div class="wrap about-grid">
        <div>
          <p class="kicker" data-i18n="about.kicker"></p>
          <p class="lede" data-i18n="about.lede"></p>
        </div>
        <p class="body" data-i18n="about.body"></p>
      </div>
    </section>

    <!-- ── Koczan Craft Leather ─────────────────────────── -->
    <section id="leather" class="band">
      <div class="wrap">
        <div class="sec-head">
          <p class="kicker" data-i18n="leather.kicker"></p>
          <h2 data-i18n="leather.title"></h2>
          <p data-i18n="leather.lead"></p>
        </div>
        <div class="leather-wrap">
          <aside class="ig-card">
            <div class="ig-handle">
              <span class="ig-badge" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1.2" fill="#fff" stroke="none"/></svg>
              </span>
              <div>
                <b>@koczancraft</b>
                <span data-i18n="leather.handleSub"></span>
              </div>
            </div>
            <p data-i18n="leather.cardText"></p>
            <a class="ig-follow" href="https://www.instagram.com/koczancraft/" target="_blank" rel="noopener" data-i18n="leather.follow"></a>
          </aside>

          <!-- Recent posts: self-hosted thumbnails linking to each post. To refresh, swap the
               images in assets/ig/ and update the hrefs (see this folder's README). -->
          <div class="ig-posts">
            <a class="ig-thumb" href="https://www.instagram.com/p/C3NOzULyfdW/" target="_blank" rel="noopener" aria-label="View on Instagram">
              <img src="assets/ig/post1.jpg" alt="Handmade leather work by @koczancraft" loading="lazy" />
            </a>
            <a class="ig-thumb" href="https://www.instagram.com/p/C5IklPUShXg/" target="_blank" rel="noopener" aria-label="View on Instagram">
              <img src="assets/ig/post2.jpg" alt="Handmade leather work by @koczancraft" loading="lazy" />
            </a>
            <a class="ig-thumb" href="https://www.instagram.com/p/C99Hwc8yYso/" target="_blank" rel="noopener" aria-label="View on Instagram">
              <img src="assets/ig/post3.jpg" alt="Handmade leather work by @koczancraft" loading="lazy" />
            </a>
          </div>
        </div>
      </div>
    </section>

    <!-- ── Apps ──────────────────────────────────────────── -->
    <section id="apps" class="band">
      <div class="wrap">
        <div class="sec-head">
          <p class="kicker" data-i18n="apps.kicker"></p>
          <h2 data-i18n="apps.title"></h2>
          <p data-i18n="apps.lead"></p>
        </div>
        <!-- Real app card → the apps hub (apps.koczancraft.com); 2 placeholder slots match
             the hub's "more on the bench" pattern so the grid grows the same way there. -->
        <div class="app-grid">
          <a class="app-card" href="https://apps.koczancraft.com">
            <img class="app-icon" src="assets/mtg-icon.png" alt="MTG Draft Companion app icon" />
            <div>
              <p class="soon-badge" data-i18n="apps.soon"></p>
              <h3>MTG Draft Companion</h3>
              <p data-i18n="apps.short"></p>
            </div>
            <span class="app-go" data-i18n="apps.cta"></span>
          </a>
          <div class="app-placeholder">
            <span class="plus" aria-hidden="true">+</span>
            <span class="label" data-i18n="apps.soon"></span>
          </div>
          <div class="app-placeholder">
            <span class="plus" aria-hidden="true">+</span>
            <span class="label" data-i18n="apps.soon"></span>
          </div>
        </div>
        <a class="apps-more" href="https://apps.koczancraft.com">
          <span data-i18n="apps.more"></span>
          <span class="arrow" aria-hidden="true">→</span>
        </a>
      </div>
    </section>
  </main>

  <footer>
    <div class="wrap">
      <div class="foot-grid">
        <div>
          <img class="wordmark" src="assets/wordmark-white.png" alt="Koczan Craft" />
          <p class="more" data-i18n="footer.more"></p>
        </div>
        <div class="foot-right">
          <div class="foot-links">
            <a href="https://www.instagram.com/koczancraft/" target="_blank" rel="noopener">Instagram</a>
            <a href="https://apps.koczancraft.com" data-i18n="nav.apps"></a>
            <a href="mailto:contact@koczancraft.com" data-i18n="footer.contact"></a>
          </div>
          <p class="copyright">© 2026 Koczan Craft · <span data-i18n="footer.tagline"></span></p>
        </div>
      </div>
    </div>
  </footer>

  <script>
    var I18N = {
      en: {
        "nav.leather": "Leather",
        "nav.apps": "Apps",
        "hero.eyebrow": "Leather goods & handcrafted apps",

    function applyLang(lang) {
      var dict = I18N[lang] || I18N.en;
      document.documentElement.lang = lang;
      document.querySelectorAll("[data-i18n]").forEach(function (el) {
        var key = el.getAttribute("data-i18n");
        if (dict[key] != null) el.innerHTML = dict[key];
      });
      document.querySelectorAll("[data-setlang]").forEach(function (b) {
        b.classList.toggle("active", b.getAttribute("data-setlang") === lang);
      });
      try { localStorage.setItem("lang", lang); } catch (e) {}
    }
    document.querySelectorAll("[data-setlang]").forEach(function (b) {
      b.addEventListener("click", function () { applyLang(b.getAttribute("data-setlang")); });
    });

    // initial language: saved → browser → en
    var saved;
    try { saved = localStorage.getItem("lang"); } catch (e) {}
    var initial = saved || ((navigator.language || "en").toLowerCase().indexOf("ja") === 0 ? "ja" : "en");
    applyLang(initial);
  </script>
</body>
</html>
